services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: rentalmanagement-db
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "YourStrong@Pass123"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - mssql-data:/var/opt/mssql
    restart: unless-stopped

  backend:
    build:
      context: ./RentalManagementBE
      dockerfile: Dockerfile
    container_name: rentalmanagement-backend
    depends_on:
      - db
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      ASPNETCORE_URLS: http://+:8080
    ports:
      - "8090:8080"
    restart: unless-stopped

volumes:
  mssql-data:  